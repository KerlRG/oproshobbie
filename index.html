<html lang="ru">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        :root {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            --card-bg: white;
            --text-primary: #1a2a32;
            --text-secondary: #2d3e50;
            --accent: #ff6b4a;
            --accent-dark: #e55a3b;
            --border-light: #e2edf2;
            --option-bg: #f8fafc;
            --font-size-base: 16px;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            padding: 1rem;
            font-size: var(--font-size-base);
        }

        /* РЕЖИМ ДЛЯ СЛАБОВИДЯЩИХ */
        body.visually-impaired {
            --bg-gradient-start: #000000;
            --bg-gradient-end: #1a1a1a;
            --card-bg: #000000;
            --text-primary: #ffffff;
            --text-secondary: #ffff99;
            --accent: #ffcc00;
            --accent-dark: #ffaa00;
            --border-light: #ffff99;
            --option-bg: #222222;
            font-size: 20px;
            letter-spacing: 0.05em;
        }

        body.visually-impaired .poster-screen,
        body.visually-impaired .quiz-card,
        body.visually-impaired .result-card {
            background: #000000;
            border: 2px solid #ffff99;
        }

        body.visually-impaired .poster-content {
            background: #000000;
        }

        body.visually-impaired .feature,
        body.visually-impaired .cat-label {
            background: #333;
            color: #ffff99;
            border: 1px solid #ffff99;
        }

        body.visually-impaired .option-item {
            background: #222;
            border: 2px solid #ffff99;
            color: white;
        }

        body.visually-impaired .btn-primary,
        body.visually-impaired .start-btn {
            background: #ffcc00;
            color: black;
        }

        .main-container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* ПАНЕЛЬ ДОСТУПНОСТИ */
        .accessibility-bar {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 0.6rem 1.2rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            align-items: center;
        }

        .access-btn {
            background: #2d3e50;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .access-btn:hover {
            background: #ff6b4a;
            transform: scale(0.97);
        }

        .lang-btn.active-lang {
            background: #ff6b4a;
            box-shadow: 0 0 0 2px white;
        }

        /* ОСНОВНЫЕ СТИЛИ */
        .poster-screen {
            background: linear-gradient(145deg, #0f0f23, #1a1a35);
            border-radius: 2.5rem;
            overflow: hidden;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4);
        }

        .poster-image {
            background: linear-gradient(120deg, #ff6b4a, #ffb347);
            padding: 2rem 1.5rem;
            text-align: center;
        }

        .poster-image h1 {
            font-size: 2rem;
            color: white;
        }

        .poster-content {
            padding: 2rem;
            background: var(--card-bg);
        }

        .feature-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin: 1.2rem 0;
        }

        .feature {
            background: #f0f2f8;
            padding: 0.5rem 1rem;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--accent);
        }

        .start-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
        }

        .quiz-screen {
            display: none;
        }

        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 1.5rem;
            justify-content: center;
        }

        .cat-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 60px;
            font-weight: 600;
            color: #e0e0e0;
            cursor: pointer;
        }

        .cat-btn.active {
            background: var(--accent);
            color: white;
        }

        .quiz-card, .result-card {
            background: var(--card-bg);
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2);
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }

        .option-item {
            background: var(--option-bg);
            border: 1.5px solid var(--border-light);
            border-radius: 1rem;
            padding: 0.9rem 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .option-item:hover {
            background: #fff5eb;
            border-color: var(--accent);
        }

        .opt-letter {
            font-weight: 800;
            background: #e9ecef;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            color: var(--accent);
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }

        button {
            border: none;
            background: #eef2f5;
            padding: 0.6rem 1.2rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
        }

        .result-desc {
            background: #fef7e0;
            padding: 1rem;
            border-radius: 1rem;
            margin: 1rem 0;
            line-height: 1.5;
        }

        footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #8899b0;
            font-size: 0.75rem;
        }

        @media (max-width: 600px) {
            .question-text { font-size: 1.2rem; }
            .accessibility-bar { gap: 8px; }
            .access-btn { padding: 0.4rem 0.8rem; font-size: 0.75rem; }
        }
    </style>
</head>

                art: { a: "🎨 美术", b: "🏺 立体艺术", c: "🎵 音乐", d: "🧵 手工" },
                sport: { a: "🏂 极限运动", b: "💪 健身瑜伽", c: "⛰️ 徒步", d: "💃 舞蹈" },
                intellect: { a: "📜 历史", b: "🔬 科学技术", c: "🌍 人文", d: "📚 自学" },
                strategy: { a: "👑 策略游戏", b: "🎭 战术游戏", c: "🔍 谜题", d: "🧩 构造" },
                collecting: { a: "🖼️ 系列收藏", b: "📜 历史收藏", c: "💰 投资收藏", d: "📷 怀旧收藏" }
            },
            resultDesc: {
                art: "你喜欢创造视觉",
                sport: "你追求活力",
                intellect: "知识是你的力量",
                strategy: "战略家思维",
                collecting: "你珍视珍品"
            }
        }
    };

    // ------------------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ -------------------
    let currentLang = 'ru';
    let currentCategory = "art";
    let currentQuestionIndex = 0;
    let answers = [];
    let finished = false;
    let showingPoster = true;

    // ------------------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ -------------------
    function t(key) {
        let val = key.split('.').reduce((o, k) => o?.[k], LOCALES[currentLang]);
        return val || key;
    }

    function speakText(text) {
        if (!text) return;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = currentLang === 'ru' ? 'ru-RU' : (currentLang === 'en' ? 'en-US' : 'zh-CN');
        speechSynthesis.cancel();
        speechSynthesis.speak(utterance);
    }

    function getCurrentSpeakableText() {
        if (showingPoster) {
            const title = document.querySelector('.poster-image h1')?.innerText || '';
            const desc = document.querySelector('.poster-content p')?.innerText || '';
            return title + '. ' + desc;
        }
        if (finished) {
            const res = document.querySelector('.result-desc strong')?.innerText;
            return res || 'Результат';
        }
        const qText = document.querySelector('.question-text')?.innerText;
        const opts = Array.from(document.querySelectorAll('.option-item span:last-child')).map(el => el.innerText).join('. ');
        const optionsLabel = currentLang === 'ru' ? 'Варианты: ' : (currentLang === 'en' ? 'Options: ' : '选项：');
        return qText + ' ' + optionsLabel + opts;
    }

    // ------------------- ОТРИСОВКА ЭКРАНОВ -------------------
    function renderPoster() {
        const p = LOCALES[currentLang].poster;
        const posterDiv = document.getElementById('posterScreen');
        posterDiv.innerHTML = `
            <div class="poster-image">
                <div class="emoji-big">${p.emoji}</div>
                <h1>${p.title}</h1>
                <p>${p.subtitle}</p>
            </div>
            <div class="poster-content">
                <h2>${p.aboutTitle}</h2>
                <p>${p.aboutText}</p>
                <div class="feature-list">
                    ${p.features.map(f => `<span class="feature">${f}</span>`).join('')}
                </div>
                <button class="start-btn" id="startQuizBtn">${p.startBtn}</button>
                <p style="margin-top:1rem; font-size:0.8rem; text-align:center;">${p.footerNote}</p>
            </div>
        `;
        document.getElementById('startQuizBtn')?.addEventListener('click', () => {
            showingPoster = false;
            finished = false;
            answers = [];
            currentQuestionIndex = 0;
            document.getElementById('posterScreen').style.display = 'none';
            document.getElementById('quizScreen').style.display = 'block';
            renderCategoryTabs();
            renderCurrentQuestion();
        });
    }

    function renderCategoryTabs() {
        const container = document.getElementById("categoryTabs");
        const cats = Object.keys(LOCALES.ru.categories);
        container.innerHTML = cats.map(cat => `
            <button class="cat-btn ${currentCategory === cat ? 'active' : ''}" data-cat="${cat}">
                ${LOCALES[currentLang].categories[cat]}
            </button>
        `).join("");
        document.querySelectorAll(".cat-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                currentCategory = btn.dataset.cat;
                resetQuizState();
                renderCategoryTabs();
                renderCurrentQuestion();
            });
        });
    }

    function resetQuizState() {
        currentQuestionIndex = 0;
        answers = [];
        finished = false;
    }

    function renderCurrentQuestion() {
        const surveyKey = currentCategory;
        const qTexts = LOCALES[currentLang].questions[surveyKey];
        const optsArray = LOCALES[currentLang].options[surveyKey];
        if (!optsArray || !qTexts) return;
        const currentOpts = optsArray[currentQuestionIndex];
        const optionsHtml = currentOpts.map((opt, idx) => {
            const letter = String.fromCharCode(97 + idx);
            return `<div class="option-item" data-type="${letter}">
                        <span class="opt-letter">${String.fromCharCode(65 + idx)}</span>
                        <span>${opt}</span>
                    </div>`;
        }).join("");
        const html = `
            <div class="quiz-card">
                <div class="question-header">
                    <span class="cat-label">${LOCALES[currentLang].categories[surveyKey]}</span>
                    <span class="q-counter">${currentQuestionIndex + 1} / 4</span>
                </div>
                <div class="question-text">${qTexts[currentQuestionIndex]}</div>
                <div class="options-list">${optionsHtml}</div>
                <div class="nav-buttons">
                    <button class="btn-secondary" id="prevBtn" ${currentQuestionIndex === 0 ? 'disabled' : ''}>${LOCALES[currentLang].common.prev}</button>
                    <button class="btn-secondary" id="backToPosterBtn">${LOCALES[currentLang].common.backToMain}</button>
                </div>
            </div>
        `;
        document.getElementById("quizContainer").innerHTML = html;
        document.querySelectorAll(".option-item").forEach(el => {
            el.addEventListener("click", () => {
                if (finished) return;
                answers.push(el.dataset.type);
                if (currentQuestionIndex + 1 < 4) {
                    currentQuestionIndex++;
                    renderCurrentQuestion();
                } else {
                    finished = true;
                    renderResult();
                }
            });
        });
        document.getElementById("prevBtn")?.addEventListener("click", () => {
            if (finished || currentQuestionIndex === 0) return;
            answers.pop();
            currentQuestionIndex--;
            renderCurrentQuestion();
        });
        document.getElementById("backToPosterBtn")?.addEventListener("click", () => {
            showingPoster = true;
            finished = false;
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('posterScreen').style.display = 'block';
            renderPoster();
        });
    }

    function renderResult() {
        const surveyKey = currentCategory;
        const counts = { a: 0, b: 0, c: 0, d: 0 };
        answers.forEach(a => counts[a]++);
        let maxType = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
        const resultText = LOCALES[currentLang].results[surveyKey][maxType];
        const desc = LOCALES[currentLang].resultDesc[surveyKey] + " ✨";
        const html = `
            <div class="result-card">
                <div class="result-emoji">✨</div>
                <div class="result-title">${LOCALES[currentLang].common.restart}</div>
                <div class="result-desc">
                    <strong>${resultText}</strong>
                    <p style="margin-top:12px;">${desc}</p>
                </div>
                <button class="restart-btn" id="restartSurveyBtn">${LOCALES[currentLang].common.restart}</button>
                <button class="back-to-poster" id="backToPosterBtn2">${LOCALES[currentLang].common.backToMain}</button>
            </div>
        `;
        document.getElementById("quizContainer").innerHTML = html;
        document.getElementById("restartSurveyBtn")?.addEventListener("click", () => {
            resetQuizState();
            renderCurrentQuestion();
        });
        document.getElementById("backToPosterBtn2")?.addEventListener("click", () => {
            showingPoster = true;
            finished = false;
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('posterScreen').style.display = 'block';
            renderPoster();
        });
    }

    function setLanguage(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active-lang', btn.dataset.lang === lang));
        if (showingPoster) {
            renderPoster();
        } else {
            renderCategoryTabs();
            if (finished) renderResult();
            else renderCurrentQuestion();
        }
    }

    function toggleVisionMode(enable) {
        if (enable) document.body.classList.add('visually-impaired');
        else document.body.classList.remove('visually-impaired');
        localStorage.setItem('visionMode', enable);
    }

    // ------------------- ИНИЦИАЛИЗАЦИЯ -------------------
    (function init() {
        if (localStorage.getItem('visionMode') === 'true') document.body.classList.add('visually-impaired');
        document.getElementById('visionBtn')?.addEventListener('click', () => toggleVisionMode(true));
        document.getElementById('normalVisionBtn')?.addEventListener('click', () => toggleVisionMode(false));
        document.getElementById('speakBtn')?.addEventListener('click', () => speakText(getCurrentSpeakableText()));
        document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => setLanguage(btn.dataset.lang)));

        showingPoster = true;
        renderPoster();
        document.getElementById('quizScreen').style.display = 'none';
        document.getElementById('posterScreen').style.display = 'block';
    })();
</script>
</body>
</html>
