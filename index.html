        :root {

            min-height: 100vh;
            padding: 1rem;
            font-size: var(--font-size-base);
        }

        body.visually-impaired {
            --bg-gradient-start: #000000;
            --bg-gradient-end: #1a1a1a;
            --card-bg: #000000;
            --text-primary: #ffffff;

            --accent: #ffcc00;
            --accent-dark: #ffaa00;
            --border-light: #ffff99;
            --option-bg: #222222;
            font-size: 20px;
            letter-spacing: 0.05em;
        }

        body.visually-impaired .poster-screen,
        body.visually-impaired .quiz-card,
        body.visually-impaired .result-card {
            background: #000000;
            border: 2px solid #ffff99;
        }

        body.visually-impaired .poster-content {
            background: #000000;
        }

        body.visually-impaired .feature,
        body.visually-impaired .cat-label {
            background: #333;
            color: #ffff99;
            border: 1px solid #ffff99;
        }

        body.visually-impaired .option-item {
            background: #222;
            border: 2px solid #ffff99;
            color: white;
        }

        body.visually-impaired .btn-primary,
        body.visually-impaired .start-btn {
            background: #ffcc00;
            color: black;
        }

        .main-container {
            max-width: 1100px;
            margin: 0 auto;
        }

            background: rgba(0, 0, 0, 0.7);

            padding: 0.6rem 1.2rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;

            border-radius: 40px;

            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
        }

        }

        }

            background: linear-gradient(145deg, #0f0f23, #1a1a35);
            border-radius: 2.5rem;
            overflow: hidden;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4);
        }

            background: linear-gradient(120deg, #ff6b4a, #ffb347);
            padding: 2rem 1.5rem;
            text-align: center;
        }

        .poster-image h1 {
            font-size: 2rem;
            color: white;
        }

        .poster-content {
            padding: 2rem;
            background: var(--card-bg);
        }

        .feature-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin: 1.2rem 0;
        }

        .feature {
            background: #f0f2f8;
            padding: 0.5rem 1rem;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--accent);
        }

            color: white;
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
        }

        .quiz-screen {
            display: none;
        }

        .quiz-card, .result-card {
            background: var(--card-bg);
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            color: var(--accent);
            font-weight: 600;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }

        .option-item {
            background: var(--option-bg);
            border: 1.5px solid var(--border-light);
            border-radius: 1rem;
            padding: 0.9rem 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .option-item:hover {
            background: #fff5eb;
            border-color: var(--accent);
        }

        .opt-letter {
            font-weight: 800;
            background: #e9ecef;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            color: var(--accent);
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }

        button {
            border: none;
            background: #eef2f5;
            padding: 0.6rem 1.2rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
        }

        .result-desc {
            background: #fef7e0;
            padding: 1rem;
            border-radius: 1rem;
            margin: 1rem 0;
            line-height: 1.5;
        }

        .result-scores {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 1rem;
            justify-content: center;
        }

            background: var(--accent);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            font-size: 0.8rem;
        }

            text-align: center;
            margin-top: 1.5rem;
            color: #8899b0;
            font-size: 0.75rem;
        }

</head>

            const text = data.questions[cat][qIdx];
            const options = data.options[cat][qIdx];
            questions.push({ category: cat, text: text, options: options });
            idx++;
        }
        return questions;
    }

    // ------------------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ -------------------
    let currentLang = 'ru';
    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let answers = [];
    let finished = false;
    let showingPoster = true;

    function t(key) {
        const parts = key.split('.');
        let val = LOCALES[currentLang];
        for (let p of parts) {
            if (val[p] === undefined) return key;
            val = val[p];
        }
        return val;
    }

    function speakText(text) {
        if (!text) return;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = currentLang === 'ru' ? 'ru-RU' : (currentLang === 'en' ? 'en-US' : 'zh-CN');
        speechSynthesis.cancel();
        speechSynthesis.speak(utterance);
    }

    function getCurrentSpeakableText() {
        if (showingPoster) {
            const title = document.querySelector('.poster-image h1')?.innerText || '';
            const desc = document.querySelector('.poster-content p')?.innerText || '';
            return title + '. ' + desc;
        }
        if (finished) {
            const res = document.querySelector('.result-desc strong')?.innerText;
            return res || 'Результат';
        }
        const qText = document.querySelector('.question-text')?.innerText;
        const opts = Array.from(document.querySelectorAll('.option-item span:last-child')).map(el => el.innerText).join('. ');
        const optionsLabel = currentLang === 'ru' ? 'Варианты: ' : (currentLang === 'en' ? 'Options: ' : '选项：');
        return qText + ' ' + optionsLabel + opts;
    }

    function renderPoster() {
        const p = LOCALES[currentLang].poster;
        const posterDiv = document.getElementById('posterScreen');
        posterDiv.innerHTML = `
            <div class="poster-image">
                <div class="emoji-big">${p.emoji}</div>
                <h1>${p.title}</h1>
                <p>${p.subtitle}</p>
            </div>
            <div class="poster-content">
                <h2>${p.aboutTitle}</h2>
                <p>${p.aboutText}</p>
                <div class="feature-list">
                    ${p.features.map(f => `<span class="feature">${f}</span>`).join('')}
                </div>
                <button class="start-btn" id="startQuizBtn">${p.startBtn}</button>
                <p style="margin-top:1rem; font-size:0.8rem; text-align:center;">${p.footerNote}</p>
            </div>
        `;
        document.getElementById('startQuizBtn')?.addEventListener('click', () => {
            showingPoster = false;
            finished = false;
            answers = [];
            currentQuestionIndex = 0;
            currentQuestions = buildUnifiedQuestions(currentLang);
            document.getElementById('posterScreen').style.display = 'none';
            document.getElementById('quizScreen').style.display = 'block';
            renderCurrentQuestion();
        });
    }

    function renderCurrentQuestion() {
        if (!currentQuestions.length) return;
        const q = currentQuestions[currentQuestionIndex];
        const optionsHtml = q.options.map((opt, idx) => {
            const letter = String.fromCharCode(97 + idx);
            return `<div class="option-item" data-type="${letter}">
                        <span class="opt-letter">${String.fromCharCode(65 + idx)}</span>
                        <span>${opt}</span>
                    </div>`;
        }).join("");
        const html = `
            <div class="quiz-card">
                <div class="question-header">
                    <span>Вопрос ${currentQuestionIndex+1} / ${currentQuestions.length}</span>
                </div>
                <div class="question-text">${q.text}</div>
                <div class="options-list">${optionsHtml}</div>
                <div class="nav-buttons">
                    <button class="btn-secondary" id="prevBtn" ${currentQuestionIndex === 0 ? 'disabled' : ''}>${LOCALES[currentLang].common.prev}</button>
                    <button class="btn-secondary" id="backToPosterBtn">${LOCALES[currentLang].common.backToMain}</button>
                </div>
            </div>
        `;
        document.getElementById("quizContainer").innerHTML = html;
        document.querySelectorAll(".option-item").forEach(el => {
            el.addEventListener("click", () => {
                if (finished) return;
                const answerLetter = el.dataset.type;
                answers.push({ category: q.category, answer: answerLetter });
                if (currentQuestionIndex + 1 < currentQuestions.length) {
                    currentQuestionIndex++;
                    renderCurrentQuestion();
                } else {
                    finished = true;
                    renderResult();
                }
            });
        });
        document.getElementById("prevBtn")?.addEventListener("click", () => {
            if (finished || currentQuestionIndex === 0) return;
            answers.pop();
            currentQuestionIndex--;
            renderCurrentQuestion();
        });
        document.getElementById("backToPosterBtn")?.addEventListener("click", () => {
            showingPoster = true;
            finished = false;
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('posterScreen').style.display = 'block';
            renderPoster();
        });
    }

    function renderResult() {
        const scores = { art: 0, sport: 0, intellect: 0, strategy: 0, collecting: 0 };
        for (let ans of answers) {
            if (scores[ans.category] !== undefined) scores[ans.category]++;
        }
        const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
        const top3 = sorted.slice(0,3);
        const resultStyles = LOCALES[currentLang].resultStyles;
        const top3Html = top3.map(([cat, score]) => {
            const style = resultStyles[cat];
            return `<div class="score-badge"><strong>${style.name}</strong> — ${style.examples}</div>`;
        }).join('');
        const html = `
            <div class="result-card">
                <div class="result-emoji">🏆</div>
                <div class="result-title">Ваш профиль хобби</div>
                <div class="result-desc">
                    <strong>Синтез интересов</strong>
                    <p style="margin-top:12px;">На основе 20 ответов мы определили твои главные сферы:</p>
                    <div class="result-scores">${top3Html}</div>
                    <p style="margin-top:12px;">✨ Попробуй комбинировать направления — например, <strong>${top3[0][1] > 0 ? resultStyles[top3[0][0]]?.name : 'творчество'}</strong> с элементами <strong>${top3[1] ? resultStyles[top3[1][0]]?.name : 'спорта'}</strong> — так ты найдёшь своё уникальное хобби.</p>
                </div>
                <button class="restart-btn" id="restartSurveyBtn">${LOCALES[currentLang].common.restart}</button>
                <button class="back-to-poster" id="backToPosterBtn2">${LOCALES[currentLang].common.backToMain}</button>
            </div>
        `;
        document.getElementById("quizContainer").innerHTML = html;
        document.getElementById("restartSurveyBtn")?.addEventListener("click", () => {
            finished = false;
            answers = [];
            currentQuestionIndex = 0;
            renderCurrentQuestion();
        });
        document.getElementById("backToPosterBtn2")?.addEventListener("click", () => {
            showingPoster = true;
            finished = false;
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('posterScreen').style.display = 'block';
            renderPoster();
        });
    }

    function setLanguage(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active-lang', btn.dataset.lang === lang));
        if (showingPoster) {
            renderPoster();
        } else {
            showingPoster = true;
            finished = false;
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('posterScreen').style.display = 'block';
            renderPoster();
        }
    }

    function toggleVisionMode(enable) {
        if (enable) document.body.classList.add('visually-impaired');
        else document.body.classList.remove('visually-impaired');
        localStorage.setItem('visionMode', enable);
    }

    (function init() {
        if (localStorage.getItem('visionMode') === 'true') document.body.classList.add('visually-impaired');
        document.getElementById('visionBtn')?.addEventListener('click', () => toggleVisionMode(true));
        document.getElementById('normalVisionBtn')?.addEventListener('click', () => toggleVisionMode(false));
        document.getElementById('speakBtn')?.addEventListener('click', () => speakText(getCurrentSpeakableText()));
        document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => setLanguage(btn.dataset.lang)));

        showingPoster = true;
        renderPoster();
        document.getElementById('quizScreen').style.display = 'none';
        document.getElementById('posterScreen').style.display = 'block';
    })();
</script>
</body>
</html>
